          - "Introduced new frontend reporting features in TypeScript and React to increase the actionability of data insights."

      - company: Intel
        position: Computer Vision / Automated Testing Intern
        location: Remote, USA
        start_date: 2021-06
        end_date: 2021-09
        highlights:
          - "Built a computer vision agent using the TensorFlow Object Detection API to automate nondeterministic GUI interactions."
          - "Integrated the agent into the GPA's Jenkins CI pipeline, enabling automated regression testing against AAA titles at scale."

    Publications:
      - title: "Compatibility-Guided Neighbor Selection for ReSTIR"
        authors:
          - Orion Junkins
          - Markus Kettunen
          - Daqi Lin
          - Ravi Ramamoorthi
          - Chris Wyman
        publisher: "Proceedings of the ACM on Computer Graphics and Interactive Techniques (PACMCGIT) 9(4). To appear at HPG 2026."
        releaseDate: 2026
        summary: >
          Proposed a geometry-based pixel compatibility heuristic for guiding spatial neighbor selection in ReSTIR via
          weighted reservoir sampling. Reduced SMAPE by 6--29% and temporal covariance by 22--49% at 2--5% overhead,
          improving the Pareto frontier of ReSTIR's error--correlation tradeoff.

      - title: "Short-Term River Forecasting with a Stacked Ensemble of Tributary Models"
        authors:
          - Patrick J. Donnelly
          - Orion Junkins
        publisher: "2022 7th International Conference on Frontiers of Signal Processing (ICFSP), IEEE. Paris, France."
        releaseDate: 2022
        url: https://ieeexplore.ieee.org/document/9924877
        summary: >
          Developed an efficient river flow forecasting approach using spatially distributed GRUs.
          Outperformed NOAA 24-hour forecasts with a 2.85% reduction in MAPE.

    Theses and Capstones:
      - company: ETH Zürich
        position: "Master's Thesis: The Error-Correlation Tradeoff in ReSTIR"
        location: Helsinki, Finland
        start_date: 2026-01
        end_date: present
        highlights:
          - "Characterized the balance between error, temporal correlation, and spatial correlation in ReSTIR."
          - "Developed a novel evaluation framework to study the structure and perceptual significance of correlations in rendering."
          - "To be published August 2026."

      - company: ETH Zürich
        position: "Semester Thesis: Neural Connectivity During Cognitively Challenging Tasks"
        location: Zürich, Switzerland
        start_date: 2024-05
        end_date: 2025-01
        highlights:
          - "Extended prior work studying embodied cognition with EEG."
          - "Implemented entropy-based synchrony metrics and established a possible neurocorrelate for the relationship between cognitive performance and free gesticulation."

      - company: Oregon State University Cascades
        position: "Capstone: LevelSage — Real-Time River Flow Rate Forecasting System"
        location: Bend, Oregon
        start_date: 2021-04
        end_date: 2023-06
        highlights:
