        highlights:
          - "Developed a real-time spatial neighbor selection algorithm for ReSTIR, reducing SMAPE by up to 29% at 2--5% overhead."
          - "Explicitly characterized the variance--covariance tradeoff in ReSTIR, improving the Pareto frontier of noise versus correlation."
          - "Provided tunable control over spatial and temporal correlations, improving compatibility with downstream denoisers."

